<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배열</title>
</head>
<body>
    <script>
         let a = ["사과","배","귤","수박"] 
        //배열된 데이터를 원소라고 한다. 
        // 콤마로 데이터를 구분한다.
        // ->4개의 원소가 저장이 되어있다.
        //왼쪽에 저장된 원소가 가장 먼저 저장되어 있다.
        //a라는 곳에 배열 데이터를 저장했다. "사과" 0번째 원소, "배" 1번째 원소, "귤"은 2번째 원소, "수박"3번째 원소이다.
        a[0] //a라는 변수를 가르킨다. 배열데이터가 불러지게 된다. 0번째 원소를 선택한다라고 해석한다. ([]순번 대괄호->인덱스 박스라고 한다.)
        console.log(a[0])//사과
        console.log(a[1])//배
        console.log(a[2])// 귤
        console.log(a[3])//수박
        console.log(a[4]) //undifinded 

        "정현진"[0]//정현진이라는 문자데이터 에서 0번째 데이터->문자데이터를 '문자열'이라고 한다.
        "정현진".length // length는 문자열의 길이를 뜻한다. 글자의 갯수이다.->3
        a.length//a데이터의 갯수
        console.log(a.length) //4
        console.log(a[0][1])//"사과"문자데이터의 1번째->과


        let b=[1,2,3,4] //b라는 변수를 만들어서 원소 4개이고 각 원소는 숫자데이터이다.
        let b=[1,2,3,4][3]//배열데이터 뒤에 인덱스가 있고 숫자가 있으면 몇번쨰 라고 해석 ->4 1->0번쨰,2->1번째,3->2번째,4->3번째

        a[b[3]]//a[4]->undifinded
        a[b[3]?1:2]//a[4]?->true->a[1]->"배"


        let b=[
            1,
            2,
            3,
            4
        ][3]

        let c =[ 
            "장윤서",
            "이은지",
            "김선영",
            "김가희",
            "최예슬"
        ] //"장윤서" 가 0번쨰 이다. 저장 순서가 배열에서는 중요하다.

        c[0] //"장윤서"
        c[4] //"최예슬"
        c[1].length //"이은지"의 문자데이터의 글자의 갯수->3
        c[2][1]+c[3][2]//"김선영"->선 + "김가희"->희 =>선희
        console.log((!c[3] || !c[4]||c[1])[0]) //"김가희" 가 아니고(false) 또는 "최예슬" 이 아니고(false) 또는 "이은지" (true) 의 0번쨰=> 이

        let d = 0||0||1 //하나라도 true이면 모두 ture 1은 true
        console.log(d) //1
        // let d = 0||0||0  //0이 저장된다.

        let person1 =["정현진","남자","infp",170,77,false,["게임","독서","러닝"]]
        
        person1[0] //"정현진"
        person1[3]//170
        person1[5]//false
        person1[5]?"기혼":"미혼" //->"미혼"
        person1[6][2]//"러닝"
        person1[6][2][1] //"닝"
        




    </script>
</body>
</html>

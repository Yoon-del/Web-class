<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>값의 형태로 정의하는 함수</title>
</head>
<body>
    <script>
        function a(){
            alert("aaa")
        }
        //기본방식으로 저장하면 항상 먼저 등록이 되면서 에러가 나지 않게 된다. (호이스팅)

        let b = function(){
            alert("bbb")
        }
        b()
       //b라는 변수를 만들고 이름없는 함수를 대입함으로써 함수를 정의할 수 있다.(익명함수)

       let c = ()=>{
        alert("ccc")
       }
       //호이스팅이 되지 않기 때문에 정의하는 함수가 항상 뒤에 와야 한다.

    //    alert(d)
    //    let d = 4 
       // d가 선언되지 않은 시점이기 때문에 에러가 난다.

       function d(n1){
        alert(n1)
       }
       d("ddd")

       let e= function(n1){
         alert(n1)
       }
       e("eee")

       let f= n1=>{
        alert(n1)
       }
       //let f= n1=>{} 매개변수가 하나일때는 소괄호가 생략이 가능하다.
       f("fff")

       let g = (a,b)=>a+b
       alert(g(1,3))
        //let g = (a,b)=>a+b /소스 코드가 한줄이라면 중괄호와 리턴까지 생략이 가능하다.

        let g = (a,b)=>[a,b]
        alert(g(1,3))
        //alert(g([1,3]))이 남는다.
    </script>

    <h1>콜백함수</h1>
    <script>
        function aa(bb){
            // bb = function(){}
            bb()
        }
        //aa함수를 실행시키면 bb라는 함수가 실행된다. aa안에 익명함수로 넣는다. 
        // ->bb라는 변수에 function(){}가 저장된다.

        aa(function(){
            alert("TT")
        })

        let cc = dd =>{
            dd()
        }
        cc(()=>{
            alert("dd")
        })
        
           
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학관련도구(함수)</title>
</head>
<body>
    <h1>수학 계산 함수</h1>
    <script>
        console.log(Math.ceil(5.33))
        // 소수점을 올려서 6으로 인식 (올림함수)
        console.log(Math.floor(5.9))
        // 소수점을 내려서 5으로 인식 (내림함수)
        console.log(Math.round(5.5))
        // 반올림->6
        console.log(Math.pow(10,3))
        // 10의 3승->1000
        console.log(Math.sqrt(100)) 
        // 루트100 ->10
        console.log(Math.abs(-30))
        // 절대값->30
        console.log(Math.max(1,2,3,4,5,6))
        // 가장 큰 숫자를 찾음 ->6
        console.log(Math.min(1,2,3))
         // 가장 작은 숫자를 찾음 ->1
        console.log( Math.random())
        // 0부터 1 사이에 사용-> 0보다 크고 1보다 작은 난수를 만들때 사용
        console.log(123.333231423.toFixed(3))
        // 소수점 3째자리까지 보임 ->문자데이터로 "123.333"으로 변환됨
        console.log(typeof(123.333231423.toFixed(3)))

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>반복문-for</title>
</head>
<body>
    <h1>반복문</h1>
    <p>조건이 참으로 계산되는 동안 소스코드를 반복하는 문법구조</p>
    <script>
        // for(조건){반복될 소스코드}
        for(let i=0 ; i<4 ; i++){
            console.log(i)
        }
        // 무한대로 반복되는 상황은 절대 없어야 한다. 의도된 횟수를 만들어야 합니다.
        // for를 만나게 되면 무조건 반복되는것으로 생각해야 합니다.
        // i라는 곳에 숫자데이터 0이 저장되어있음.(최초 한번만 해석됨)
        // i<4 ->i가 4보다 작다. ->이 조건이 참이다. 
        // 조건이 참일때 바로 중괄호 안으로 소스코드를 계산합니다. 
        // 중괄호 안에 있는 console.log로 넘어가서 계산함
        // 계산식이 참일경우 다시 조건식 i<4 로 넘어가서 계산하고 참일 경우 i++(i에을 더함) 계산함
        // i++은 i에 1을 더해서 저장된다.
        // 조건이 false라면 중괄호 안에 들어가지 못하고 계산이 종료된다.

         for(let i=0 ; i<20 ; i++){
            document.write(`<li>${i}</li>`)
        }

        for(let i=1 ; i<=9 ; i++){
            document.write(`<li>5*${i} = ${5*i}</li>`);
        }
      
        let dan = Number(prompt("몇 단을 출력할까요?"))
        for(let i=1 ; i<=9 ; i++){
            document.write(`<li>${dan}*${i} = ${dan*i}</li>`);
        }       
        
        let myclass = ["장윤서","이은지","김민지","조성현","김선영"]   

    </script>

    <!-- <li>0</li>
    <li>5*1=5</li> -->
    <ul>
        <script>
            for(let i=0 ; i<myclass.length ; i++){
                document.write(`<li>${myclass[i]}</li>`)
            }            
        </script>
    </ul>

    
</body>
</html>

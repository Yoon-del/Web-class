    <script>
        for(let i=0 ; i<2 ; i++){
            for(let j=0 ; j<3 ; j++){
                document.write(`<p>i의 값:${i} / j의 값:${j} </p>`)
            }
        }
    </script>

   <style>
    .box {
        display: grid;
        gap: 20px;
        padding: 20px;
    }
    ul { 
        list-style: none; 
        border: 1px solid #ccc; 
        padding: 10px; 
    }
    li { padding: 5px; }
</style>

    <script>
        let columns = prompt("몇 열로 구구단을 정리할까요?");
        document.write(`<div class="box" style="grid-template-columns: repeat(${columns}, 1fr);">`);
        
        for (let dan = 2; dan <= 9; dan++) {
            document.write("<ul>");
            document.write(`<h2>${dan}단</h2>`);

            for (let i = 1; i <= 9; i++) {
                document.write(`<li>${dan} x ${i} = ${dan * i}</li>`);
            }

            document.write("</ul>");
        }
        
        document.write(`</div>`);
    </script>

</body>

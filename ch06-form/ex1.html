<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form 예시</title>
    
</head>
<body>
    <div>
        <h1>로그인</h1>

        <form action="#"> 

            <h2>Wavve 계정으로 로그인</h2>
            <div>
                <label for="user-id">아이디</label>
                <input type="text" placeholder="이메일 주소 또는 아이디" id="user-id">
            </div>
            
            <div>
                <label for="user-pw">비밀번호</label>
                <input type="password" placeholder="비밀번호" id="user-pw">
            </div>

            <div>
                <input type="checkbox" id="user-id-save">
                <label for="user-id-save">아이디 저장</label>
                <input type="checkbox" id="login-auto">
                <label for="login-auto">자동 로그인</label>
            </div>
        
            <button type="submit">로그인</button>
            <!-- <button type="submit">로그인</button> -->
        </form>
            <div>
                <ul style="display: flex;list-style: none;gap:20px">
                    <li><a href="#">아이디찾기</a> </li>
                    <li><a href="#">비밀번호 찾기</a></li>
                    <li> <a href="#">회원가입</a></li> 
                </ul>
            </div>        
    </div>
        
        <form action="#">
            <div>
                <h2>또는 다른 서비스 계정으로 로그인</h2>
                <ul style="display: flex;list-style: none;gap:20px">
                    <li><a href="#" target="_blank"><img src="./img/ico-common-kakao.png" alt="kakao login"></a></li>
                    <li><a href="#" target="_blank"><img src="./img/ico-common-tworld.png" alt="tworld login"></a></li>

                    <li><a href="#" target="_blank"><img src="./img/ico-common-facebook.png" alt="facebook login"></a></li>
                    <li><a href="#" target="_blank"><img src="./img/ico-common-apple.png" alt="apple login"></a></li>
                </ul>    
            </div>

            <p>*SNS 계정으로 간편하게 가입하여 서비스를 이용하실 수 있습니다. <br>
                기존 POOQ 계정 또는 Wavve 계정과는 연동되지 않으니 이요해 참고 하세요.</p>
        </form>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예제2</title>
</head>
<body>
    <div>
        <h1>CREATE YOUR ACCOUNT</h1>
        
        <form action="#">
            <div>
                <label for="user-email">Email Address</label>
                <input type="text" id="user-email">
            </div>

            <div>
                <label for="address-confirm">Confirm your Address</label>
                <input type="text" id="address-confirm">
            </div>
                
            <div>
                <label for="country-residence">Country of Residence</label>
                <select id="country-residence">
                    <option value="Korea, Republic of">Korea, Republic of</option>
                    <option value="America" >America</option>
                    <option value="Belgium" disabled>Belgium</option>
                    <option value="Canada">Canada</option>
                </select>
            </div>
              
                
            <div id="captcha"></div>
                
            <div>
                <label for="agree"></label>
                <input type="checkbox" id="agree">I am 13 years of age or older and agree to the terms of the Steam <strong>Subscriber Argree</strong> and the <strong>Valve Privacy Policy</strong>. 
            </div>

            <!-- <button type="submit">Continue</button> -->
            <input type="submit" value="Continue">

        </form>
    
</body>
</html>

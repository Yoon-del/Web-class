<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>boolean</title>
</head>
<body>
    <h1>boolean - 참 거짓 데이터</h1>
    <script>
        10>2 //ture
        10<2 //false
        10>= //ture 10이 2보다 크거나 같다
        10<=2 //false 10이 2보다 작거나 같다.ture
        10==10 //true 10과 같다.
        10===10 //true 10이 10과 데이터형태까지 모두 같다.(엄격한 비교)
        10!=1//true 10이 1과 같지 않다.
        !(10>2)//false 
        console.log(10>2)
        console.log( !(10>2))

      
        false로 간주되는 5가지 외우기
        0 //0은 false로 간주된다.
        ""//내용이 없기 때문에 false로 간주된다.
        let a //a라는 공간에 아무 값도 없을때 false로 간주한다.
        undefined // false로 간주된다.
        null //false로 간주된다.


        -12,12//수가 있으면 음수와 양수 모두 true이다.
        !-12//false !느낌표는 부정의 의미이다.
        !""//flase
        !a//ture

        let b = null // b라는 변수를 만들어서 비우다 라는 의미이다. (초기화의 의미)


    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>논리연산자</title>
</head>
<body>
    <script>
        // 그리고
        10>2 && 5>2 // true
        //&&는 그리고 로 해석한다. 
        // 10이 2보다 크다. 그리고 5가 2보다 크다. 
        // 그리고는 조건 모두 ture 여야 true가 된다. 
        // 조건식 중 하나라도 false가 있으면 false가 된다.

        5>1 && 5>2 && 5<3 //false
        10>4 && 0 && 20 //false
        let b = 10>4 && 0 && 20
        console.log(b)
        0 && 10 && 20 && 30 //false

        // 또는
        10<2 || 3!=3 || 4>2 // 하나라도 true가 있을때는 true가 된다. 
        0 || !10 || !!20 //true
        let a = 10 || "" ||20 //ture
        console.log(a)




    </script>
</body>
</html>
